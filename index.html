<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RingWars 3D</title>
    <style>
      html, body, #app { margin: 0; width: 100%; height: 100%; background: #05070d; overflow: hidden; }
      .hud { position: fixed; inset: 16px auto auto 16px; color: #dce7ff; font: 14px/1.2 system-ui, sans-serif; z-index: 10; }
      .badge { display: inline-block; margin-right: 8px; padding: 6px 10px; border: 1px solid #2a3550; border-radius: 999px; background: #0f1526cc; }
    </style>
  </head>
  <body>
    <div class="hud">
      <span class="badge" id="health">HP 100</span>
      <span class="badge" id="score">Score 0</span>
      <span class="badge">Versus: ?mode=host/client&room=x&ws=wss://server • Dodge i-frames • Boss hazards • 4/5/6 swap</span>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
